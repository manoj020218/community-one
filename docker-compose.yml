version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: jenix-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: jenix-community-one
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: jenix-mongo-ui
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:
